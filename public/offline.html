<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focali — Sem conexão</title>
  <style>
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
      text-align: center; padding: 24px; box-sizing: border-box;
    }
    .card { max-width: 360px; }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.5px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.65; margin: 0 0 24px; }
    button {
      padding: 12px 28px; border-radius: 10px; border: none;
      background: #0bd8b6; color: #0f172a; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sem conexão</h1>
    <p>Você está offline no momento. Verifique sua conexão com a internet e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
